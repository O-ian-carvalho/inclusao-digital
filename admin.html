<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Inclusão Digital</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <nav class="navbar app-navbar">
      <div class="container">
        <a class="navbar-brand" href="dashboard.html">
          <i class="bi bi-windows"></i>
          Inclusão Digital
        </a>
        <div class="d-flex align-items-center gap-3">
          <span class="d-none d-sm-inline text-muted small" id="admin-email-display"></span>
          <a href="dashboard.html" class="btn btn-outline-primary btn-sm">Dashboard</a>
          <button id="logout-btn" class="btn btn-outline-secondary btn-sm">Sair</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex align-items-center gap-2 mb-4">
        <i class="bi bi-shield-lock fs-2 text-primary"></i>
        <div>
          <h1 class="fs-3 fw-bold mb-0">Painel Administrativo</h1>
          <p class="text-muted mb-0 small">Visão geral da plataforma</p>
        </div>
      </div>

      <!-- Stats cards -->
      <div class="row g-3 mb-4" id="stats-row">
        <div class="col-6 col-md-3">
          <div class="admin-stat">
            <div class="admin-stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-people-fill"></i></div>
            <div class="admin-stat-body">
              <div class="admin-stat-value"><span id="stat-users">—</span></div>
              <div class="admin-stat-label">Usuários</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="admin-stat">
            <div class="admin-stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-check2-all"></i></div>
            <div class="admin-stat-body">
              <div class="admin-stat-value"><span id="stat-completions">—</span></div>
              <div class="admin-stat-label">Módulos concluídos</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="admin-stat">
            <div class="admin-stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-book"></i></div>
            <div class="admin-stat-body">
              <div class="admin-stat-value"><span id="stat-modules">5</span></div>
              <div class="admin-stat-label">Total de módulos</div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="admin-stat">
            <div class="admin-stat-icon bg-info bg-opacity-10 text-info"><i class="bi bi-bar-chart-fill"></i></div>
            <div class="admin-stat-body">
              <div class="admin-stat-value"><span id="stat-avg">—</span>%</div>
              <div class="admin-stat-label">Média de progresso</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Per-module completion -->
      <div class="card admin-card mb-4">
        <div class="card-header">Módulos concluídos por usuário</div>
        <div class="card-body" id="module-stats">
          <div class="skeleton" style="height:180px;border-radius:.5rem"></div>
        </div>
      </div>

      <!-- User progress table -->
      <div class="card admin-card">
        <div class="card-header">Progresso individual dos usuários</div>
        <div class="card-body p-0" id="user-progress-table">
          <div class="p-4">
            <div class="skeleton" style="height:120px;border-radius:.5rem"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="assets/js/vendor-loader.js"></script>
    <script src="firebase-config.js"></script>
    <script src="assets/js/modules-data.js"></script>
    <script src="assets/js/admin.js"></script>
  </body>
</html>
