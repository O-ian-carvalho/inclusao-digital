<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - Inclusão Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <nav class="navbar app-navbar">
      <div class="container">
        <a class="navbar-brand" href="#">
          <i class="bi bi-windows"></i>
          Inclusão Digital
        </a>
        <div class="d-flex align-items-center gap-3">
          <span class="d-none d-sm-inline text-muted small" id="user-email-display"></span>
          <button id="logout-btn" class="btn btn-outline-secondary btn-sm">Sair</button>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="course-header mb-4">
        <div class="row align-items-center">
          <div class="col-md-7 mb-3 mb-md-0">
            <h1 class="course-title">Uso Básico do Windows</h1>
            <p class="course-desc">Aprenda operações básicas do Windows para melhorar inclusão digital e acessibilidade.</p>
          </div>
          <div class="col-md-5 col-lg-4 ms-md-auto">
            <div class="progress-section">
              <div class="d-flex align-items-center justify-content-between">
                <span class="progress-label">Progresso</span>
                <span class="progress-count"><span id="modules-completed">0</span>/<span id="modules-total">0</span></span>
              </div>
              <div class="progress">
                <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Loading skeleton -->
      <div id="modules-skeleton" class="module-grid">
        <div class="skeleton skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line" style="width:75%"></div><div class="skeleton-block"></div></div>
        <div class="skeleton skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line" style="width:75%"></div><div class="skeleton-block"></div></div>
        <div class="skeleton skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line" style="width:75%"></div><div class="skeleton-block"></div></div>
        <div class="skeleton skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line" style="width:75%"></div><div class="skeleton-block"></div></div>
        <div class="skeleton skeleton-card"><div class="skeleton-line short"></div><div class="skeleton-line" style="width:75%"></div><div class="skeleton-block"></div></div>
      </div>

      <div class="module-grid d-none" id="modules-container"></div>
    </main>

    <script src="assets/js/vendor-loader.js"></script>
    <script src="firebase-config.js"></script>
    <script src="assets/js/modules-data.js"></script>
    <script src="assets/js/dashboard.js"></script>
  </body>
</html>
