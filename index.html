<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Inclusão Digital</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="bi bi-windows"></i>
        <h3>Inclusão Digital</h3>
      </div>
      <p class="auth-subtitle">Faça login para acessar os módulos sobre uso básico do Windows.</p>

      <div id="alert" class="alert alert-danger d-none" role="alert"></div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="Sua senha" required>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary">Entrar</button>
        </div>
      </form>

      <hr>
      <p class="auth-footer">Não tem conta? <a href="signup.html">Cadastre-se</a></p>
    </div>

    <script src="assets/js/vendor-loader.js"></script>
    <script src="firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
