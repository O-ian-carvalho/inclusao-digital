<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Inclusão Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="card-title mb-3">Inclusão Digital</h3>
              <p class="text-muted">Faça login para acessar os módulos sobre uso básico do Windows.</p>

              <div id="alert" class="alert alert-danger d-none" role="alert"></div>

              <form id="login-form">
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Senha</label>
                  <input type="password" id="password" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
              </form>

              <hr>
              <p class="mb-0">Não tem conta? <a href="signup.html">Cadastre-se</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/vendor-loader.js"></script>
    <script src="firebase-config.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
